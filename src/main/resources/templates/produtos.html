<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mb-4">
        <div class="card-header bg-dark text-white">
            <h2 class="mb-0" th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'"></h2>
        </div>
        <div class="card-body">
            <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" th:field="*{nome}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Preço</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{preco}" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${'R$ ' + p.preco}"></td>
                    <td>
                        <a th:href="@{/produtos/editar/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/produtos/deletar/{id}(id=${p.id})}" class="btn btn-danger btn-sm">Deletar</a>
                    </td>
                </tr>
                </tbody>
            </table>
            <a th:href="@{/}" class="btn btn-primary mt-3">Voltar ao Menu</a>
        </div>
    </div>
</div>
</body>
</html>
